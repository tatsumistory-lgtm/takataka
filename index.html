<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Tatsumi Portfolio</title>
  <style>
    body {
      font-family: "Helvetica", sans-serif;
      background-color: #f5f7fa;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    header {
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      color: white;
      padding: 60px 20px;
    }
    h1 {
      margin: 0;
      font-size: 36px;
    }
    p {
      font-size: 18px;
      color: #333;
    }
    .section {
      padding: 40px 20px;
    }
    .card {
      background: white;
      padding: 20px;
      margin: 20px auto;
      max-width: 500px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<header>
  <h1>Tatsumi Portfolio</h1>
  <p>やさしく伝わるデザインを制作しています</p>
</header>

<div class="section">
  <div class="card">
    <h2>About Me</h2>
    <p>
      Canva・HTML・CSSを使って<br>
      シンプルで見やすいデザインを作っています。
    </p>
  </div>

  <div class="card">
    <h2>Works</h2>
    <p>ここに作品を追加していきます</p>
  </div>

  <div class="card">
    <h2>Contact</h2>
    <p>お問い合わせは準備中です</p>
  </div>
</div>

</body>
</html>
